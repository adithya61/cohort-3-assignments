<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bg-color changer</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      #colors {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
      }
      #bg {
        height: 80vh;
        width: 100vw;
        background-color: white;
      }
      #colors {
        padding-top: 10px;
      }
      #colors * {
        cursor: pointer;
        padding: 10px;
        border-radius: 30%;
      }
    </style>
  </head>
  <body>
    <div
      id="container"
      style="background-color: wheat; height: 100vh; width: 100vw"
    >
      <div id="bg"></div>

      <div id="colors">
        <div style="background-color: blue; color: white" id="blue">blue</div>
        <div style="background-color: purple; color: white" id="purple">
          purple
        </div>
        <div style="background-color: red; color: white" id="red">red</div>
        <div style="background-color: orange; color: white" id="orange">
          orange
        </div>
        <div
          style="background-color: white; color: black; border: 1px black solid"
          id="white"
        >
          default
        </div>
      </div>
      <div style="padding-top: 20px; text-align: center">
        <input id="custom" type="text" />
        <button
          id="add-custom"
          style="
            background-color: grey;
            border-radius: 10%;
            color: white;
            cursor: pointer;
            margin-left: 10px;
          "
        >
          Add custom color
        </button>
      </div>
    </div>
  </body>
  <script>
    let bg = document.querySelector("#bg");
    let colors = document.querySelector("#colors");

    colors.addEventListener("click", (event) => {
      let clickedColor = event.target;
      bg.style.backgroundColor = clickedColor.id;
      console.log(clickedColor.id, "clcked");
    });

    let addCustom = document.querySelector("#add-custom");
    addCustom.addEventListener("click", () => {
      let customColorElement = document.querySelector("#custom");
      let customColor = customColorElement.value;
      customColorElement.value = "";

      let newColor = document.createElement("div");
      newColor.textContent = customColor;
      newColor.id = customColor;
      newColor.style.background = customColor;
      newColor.style.color = "white";

      colors.appendChild(newColor);
    });
  </script>
</html>
